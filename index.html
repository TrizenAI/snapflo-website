<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/snapflo-favicon.png" />
    <link rel="apple-touch-icon" href="/snapflo-favicon.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://snapflo.studio" />

    <!-- Preload critical assets -->
    <link rel="preload" href="/snapflo-side-logo.png" as="image" />

    <!-- DM Sans via Google Fonts — loaded in HTML so it never blocks JS parse -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" />

    <!-- Primary SEO -->
    <title>Snapflo | Studio Management Software for Photographers & Creators</title>
    <meta name="description" content="Snapflo is an all-in-one studio management platform for photographers, freelancers, and content creators. Book clients, deliver branded galleries, send invoices, and track growth — all in one place." />
    <meta name="keywords" content="photography studio management, photographer software, client booking, photo gallery delivery, studio invoicing, content creator platform, freelancer tools, India photography app" />
    <meta name="author" content="TrizenAI Technologies Private Limited" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#6366F1" />

    <!-- Cache control — forces crawlers to re-fetch fresh content -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Open Graph (WhatsApp, Facebook, Telegram, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Snapflo" />
    <meta property="og:url" content="https://snapflo.studio" />
    <meta property="og:title" content="Snapflo — Studio Management Software for Photographers & Creators" />
    <meta property="og:description" content="Book clients, deliver stunning galleries, send invoices, and track your growth — all under one roof. Built for studio owners, freelancers, and content creators." />
    <meta property="og:image" content="https://snapflo.studio/snapflo-side-logo.png?v=20260410" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Snapflo — Studio Management Software" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@snapflo" />
    <meta name="twitter:title" content="Snapflo — Studio Management Software for Photographers & Creators" />
    <meta name="twitter:description" content="Book clients, deliver stunning galleries, send invoices, and track your growth — all under one roof." />
    <meta name="twitter:image" content="https://snapflo.studio/snapflo-side-logo.png?v=20260410" />
    <meta name="twitter:image:alt" content="Snapflo — Studio Management Software" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Snapflo",
      "url": "https://snapflo.studio",
      "logo": "https://snapflo.studio/snapflo-favicon.png",
      "description": "All-in-one studio management platform for photographers, freelancers, and content creators. Book clients, deliver branded galleries, send invoices, and track growth.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR",
        "description": "Free trial available, no credit card required"
      },
      "publisher": {
        "@type": "Organization",
        "name": "TrizenAI Technologies Private Limited",
        "url": "https://snapflo.studio",
        "logo": "https://snapflo.studio/snapflo-favicon.png",
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+91-9003382337",
          "email": "support@snapflo.studio",
          "contactType": "customer support",
          "areaServed": "IN"
        },
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Chennai",
          "addressRegion": "Tamil Nadu",
          "addressCountry": "IN"
        }
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
