<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/snapflo-favicon.png" />
    <link rel="apple-touch-icon" href="/snapflo-favicon.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://snapflo.studio" />

    <!-- Preload critical assets — fires before JS downloads -->
    <link rel="preload" href="/snapflo-side-logo.png" as="image" />
    <link rel="preload" href="/images/arrangement-professional-photographer-equipment.webp" as="image" fetchpriority="high" />

    <!-- DM Sans self-hosted — preloaded directly, no external chain -->
    <link rel="preload" href="/fonts/dm-sans-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Primary SEO -->
    <title>Snapflo | Studio Management Software for Photographers & Creators</title>
    <meta name="description" content="Snapflo is an all-in-one studio management platform for photographers, freelancers, and content creators. Book clients, deliver branded galleries, send invoices, and track growth — all in one place." />
    <meta name="keywords" content="photography studio management software, photographer booking app, photo gallery delivery, studio invoicing tool, client management for photographers, social media scheduler for creators, photography business analytics, freelancer studio tool, content creator platform India, shoot scheduling app" />
    <meta name="author" content="TrizenAI Technologies Private Limited" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#6366F1" />

    <!-- Cache control — forces crawlers to re-fetch fresh content -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Open Graph (WhatsApp, Facebook, Telegram, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Snapflo" />
    <meta property="og:url" content="https://snapflo.studio" />
    <meta property="og:title" content="Snapflo — Studio Management Software for Photographers & Creators" />
    <meta property="og:description" content="Book clients, deliver stunning galleries, send invoices, and track your growth — all under one roof. Built for studio owners, freelancers, and content creators." />
    <meta property="og:image" content="https://snapflo.studio/snapflo-side-logo.png?v=20260410" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Snapflo — Studio Management Software" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@snapflo" />
    <meta name="twitter:title" content="Snapflo — Studio Management Software for Photographers & Creators" />
    <meta name="twitter:description" content="Book clients, deliver stunning galleries, send invoices, and track your growth — all under one roof." />
    <meta name="twitter:image" content="https://snapflo.studio/snapflo-side-logo.png?v=20260410" />
    <meta name="twitter:image:alt" content="Snapflo — Studio Management Software" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">

      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Snapflo",
      "url": "https://snapflo.studio",
      "logo": "https://snapflo.studio/snapflo-favicon.png",
      "description": "All-in-one studio management platform for photographers, freelancers, and content creators. Book clients, deliver branded galleries, send invoices, and track growth.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR",
        "description": "Free trial available, no credit card required"
      },
      "publisher": {
        "@type": "Organization",
        "name": "TrizenAI Technologies Private Limited",
        "url": "https://snapflo.studio",
        "logo": "https://snapflo.studio/snapflo-favicon.png",
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+91-9003382337",

        },
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Chennai",

          "addressCountry": "IN"
        }
      }

    <!-- FAQ Schema — shows as rich results in Google -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Snapflo?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Snapflo is an all-in-one studio management platform for photographers, freelancers, and content creators. It lets you book clients, deliver branded photo galleries, send invoices, schedule social media posts, and track your business growth — all from one place."
          }
        },
        {
          "@type": "Question",
          "name": "Is Snapflo free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Snapflo offers a free trial with no credit card required. You can start managing your studio immediately and explore all features before committing to a plan."
          }
        },
        {
          "@type": "Question",
          "name": "Who is Snapflo for?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Snapflo is built for photography studio owners, solo freelance photographers, and content creators who need to manage client bookings, photo gallery delivery, invoicing, and social media — without juggling multiple tools."
          }
        },
        {
          "@type": "Question",
          "name": "What features does Snapflo offer?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Snapflo includes shoot and event scheduling, client invoicing and billing, branded photo gallery delivery, payment collection, client relationship management, social media post scheduling, and business analytics and insights."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <!-- LCP image rendered in HTML so preload scanner discovers it instantly, before any JS -->
    <img
      src="/images/arrangement-professional-photographer-equipment.webp"
      alt="Professional photography equipment arrangement for studio management"
      fetchpriority="high"
      decoding="sync"
      width="900"
      height="675"
      style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;overflow:hidden"
    />
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
